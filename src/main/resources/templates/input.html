<div class="container">

<h1>Etiqueta &lt;input&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta input se utiliza para crear campos donde los usuarios pueden ingresar datos.
</p>

<h2>Sintaxis</h2>

<pre><code>
<input type="text">
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<input type="text" placeholder="Escribe tu nombre">

</div>

</div>

</body>
