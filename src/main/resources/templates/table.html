<!DOCTYPE html>
<html>
<head>
<title>Etiqueta table</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;table&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta table se utiliza para crear tablas en HTML. Permite organizar información en filas y columnas.
</p>

<h2>Sintaxis</h2>

<pre><code>
<table>
<tr>
<td>Dato</td>
</tr>
</table>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<table border="1">
<tr>
<th>Nombre</th>
<th>Edad</th>
</tr>

<tr>
<td>Ana</td>
<td>20</td>
</tr>

<tr>
<td>Luis</td>
<td>22</td>
</tr>

</table>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
