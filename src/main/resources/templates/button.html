<!DOCTYPE html>
<html>
<head>
<title>Etiqueta button</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;button&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta button se utiliza para crear botones interactivos en una página web.
</p>

<h2>Sintaxis</h2>

<pre><code>
<button>Enviar</button>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<button>Presionar</button>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
