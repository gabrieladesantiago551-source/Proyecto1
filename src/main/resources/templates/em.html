<!DOCTYPE html>

<title>Etiqueta em</title>

<body>

<div class="container">

<h1>Etiqueta &lt;em&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta em se utiliza para dar énfasis a una parte del texto.
Normalmente el navegador muestra este texto en cursiva.
</p>

<h2>Sintaxis</h2>

<pre><code>
<em>Texto con énfasis</em>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<p>Este es un texto normal y <em>esta parte tiene énfasis</em>.</p>
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
