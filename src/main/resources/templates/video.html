<!DOCTYPE html>
<html>
<head>
<title>Etiqueta video</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;video&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta video permite reproducir videos dentro de una página web.
</p>

<h2>Sintaxis</h2>

<pre><code>
<video controls>
<source src="video.mp4">
</video>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<video width="300" controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
