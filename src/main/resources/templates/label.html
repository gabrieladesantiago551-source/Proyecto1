<!DOCTYPE html>
<html>
<head>
<title>Etiqueta label</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;label&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta label se utiliza para identificar un campo de formulario.
</p>

<h2>Sintaxis</h2>

<pre><code>
<label>Nombre</label>
<input type="text">
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<label>Nombre:</label>
<input type="text">

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
