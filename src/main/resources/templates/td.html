<!DOCTYPE html>
<html>
<head>
<title>Etiqueta td</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;td&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta td se utiliza para definir una celda de datos dentro de una tabla.
</p>

<h2>Sintaxis</h2>

<pre><code>
<td>Dato</td>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<table border="1">

<tr>
<td>Manzana</td>
<td>Banana</td>
</tr>

</table>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
