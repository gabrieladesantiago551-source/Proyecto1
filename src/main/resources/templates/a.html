<h1>Etiqueta &lt;a&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta a se utiliza para crear enlaces o hipervínculos hacia otras páginas web o recursos.
</p>

<h2>Sintaxis</h2>

<pre><code>
<a href="https://www.google.com">Ir a Google</a>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<a href="https://www.google.com">Visitar Google</a>
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
