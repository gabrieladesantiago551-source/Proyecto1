<!DOCTYPE html>
<html>
<head>
<title>Etiqueta audio</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;audio&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta audio se utiliza para reproducir archivos de sonido en una página web.
</p>

<h2>Sintaxis</h2>

<pre><code>
<audio controls>
<source src="audio.mp3">
</audio>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<audio controls>
<source src="https://www.w3schools.com/html/horse.mp3">
</audio>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
