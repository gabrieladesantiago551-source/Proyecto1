<!DOCTYPE html>
<html>
<head>
<title>Etiqueta ol</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;ol&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta ol se utiliza para crear listas ordenadas.
Los elementos aparecen numerados automáticamente.
</p>

<h2>Sintaxis</h2>

<pre><code>
<ol>
<li>Elemento 1</li>
<li>Elemento 2</li>
</ol>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<ol>
<li>Primero</li>
<li>Segundo</li>
<li>Tercero</li>
</ol>
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
