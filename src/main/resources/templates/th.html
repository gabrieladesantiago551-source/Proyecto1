<!DOCTYPE html>
<html>
<head>
<title>Etiqueta th</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;th&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta th se utiliza para definir celdas de encabezado en una tabla.
Generalmente aparecen en negritas y centradas.
</p>

<h2>Sintaxis</h2>

<pre><code>
<th>Encabezado</th>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<table border="1">

<tr>
<th>Nombre</th>
<th>Edad</th>
</tr>

<tr>
<td>Ana</td>
<td>20</td>
</tr>

</table>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
