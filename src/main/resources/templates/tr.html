<!DOCTYPE html>
<html>
<head>
<title>Etiqueta tr</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;tr&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta tr define una fila dentro de una tabla HTML.
</p>

<h2>Sintaxis</h2>

<pre><code>
<tr>
<td>Dato</td>
</tr>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">

<table border="1">

<tr>
<td>Celda 1</td>
<td>Celda 2</td>
</tr>

</table>

</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
