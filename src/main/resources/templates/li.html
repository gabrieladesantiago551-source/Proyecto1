<!DOCTYPE html>
<html>
<head>
<title>Etiqueta li</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;li&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta li se utiliza para definir un elemento dentro de una lista.
Puede usarse dentro de listas ul o ol.
</p>

<h2>Sintaxis</h2>

<pre><code>
<li>Elemento de lista</li>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<ul>
<li>Elemento uno</li>
<li>Elemento dos</li>
</ul>
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
