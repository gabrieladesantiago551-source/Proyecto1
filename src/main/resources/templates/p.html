<!DOCTYPE html>
<html>
<head>
<title>Etiqueta p</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;p&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta p se utiliza para definir párrafos de texto en una página web.
Permite organizar el contenido en bloques fáciles de leer.
</p>

<h2>Sintaxis</h2>

<pre><code>
<p>Texto del párrafo</p>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<p>Este es un ejemplo de párrafo.</p>
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
