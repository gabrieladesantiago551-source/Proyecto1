<!DOCTYPE html>
<html>
<head>
<title>Etiqueta ul</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;ul&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta ul se utiliza para crear listas no ordenadas.
Los elementos dentro de la lista se definen con la etiqueta li.
</p>

<h2>Sintaxis</h2>

<pre><code>
<ul>
<li>Elemento 1</li>
<li>Elemento 2</li>
</ul>
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<ul>
<li>Manzana</li>
<li>Banana</li>
<li>Naranja</li>
</ul>
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
