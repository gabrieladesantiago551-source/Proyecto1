<!DOCTYPE html>
<html>
<head>
<title>Etiqueta img</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Etiqueta &lt;img&gt;</h1>

<h2>Descripción</h2>
<p>
La etiqueta img se utiliza para insertar imágenes dentro de una página web.
</p>

<h2>Sintaxis</h2>

<pre><code>
<img src="imagen.jpg" alt="Descripción de la imagen">
</code></pre>

<h2>Ejemplo</h2>

<div class="example">
<img src="https://via.placeholder.com/150" alt="Imagen de ejemplo">
</div>

<nav>
<a href="/">Inicio</a>
</nav>

</div>

</body>
</html>
